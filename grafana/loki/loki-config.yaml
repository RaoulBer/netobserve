# Loki — single-binary, filesystem storage, OTLP ingestion enabled (Loki 3.x).
# The Collector pushes logs to http://loki:3100/otlp/v1/logs; trace_id/span_id
# arrive as structured metadata, which makes trace<->log correlation work.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Structured metadata is what carries trace_id/span_id from OTLP logs.
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 24h

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
