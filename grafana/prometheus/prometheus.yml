# Prometheus scrapes the Collector's Prometheus exporter (app/OTel metrics on :8889)
# and the Collector's own internal telemetry (:8888).
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: otel-collector-app-metrics
    static_configs:
      - targets: ['otel-collector:8889']
  - job_name: otel-collector-internal
    static_configs:
      - targets: ['otel-collector:8888']
